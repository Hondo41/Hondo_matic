<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON VOID</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --neon-cyan: #00ffff;
    --neon-pink: #ff00aa;
    --neon-yellow: #ffff00;
    --neon-purple: #bf00ff;
    --dark-bg: #030008;
    --grid-color: rgba(0,255,255,0.04);
  }

  body {
    background: var(--dark-bg);
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  canvas {
    display: block;
    touch-action: none;
  }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  #score-display {
    position: fixed;
    top: env(safe-area-inset-top, 16px);
    left: 50%;
    transform: translateX(-50%);
    margin-top: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(18px, 5vw, 28px);
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px var(--neon-cyan);
    letter-spacing: 4px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #score-display.visible { opacity: 1; }

  #level-display {
    position: fixed;
    top: env(safe-area-inset-top, 16px);
    right: 16px;
    margin-top: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 3vw, 14px);
    color: var(--neon-pink);
    text-shadow: 0 0 8px var(--neon-pink);
    letter-spacing: 2px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #level-display.visible { opacity: 1; }

  /* SCREENS */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    background: radial-gradient(ellipse at center, rgba(3,0,8,0.95) 0%, rgba(3,0,8,0.99) 100%);
    padding: 20px;
  }

  .screen.hidden { display: none; }

  .glitch-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(48px, 16vw, 88px);
    color: var(--neon-cyan);
    text-shadow:
      0 0 10px var(--neon-cyan),
      0 0 40px var(--neon-cyan),
      0 0 80px var(--neon-cyan);
    letter-spacing: 8px;
    position: relative;
    animation: glitch 3s infinite;
    line-height: 1;
    text-align: center;
  }

  @keyframes glitch {
    0%, 92%, 100% { transform: translate(0); filter: none; }
    93% { transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
    94% { transform: translate(3px, -1px); color: var(--neon-pink); }
    95% { transform: translate(0); filter: none; }
    97% { transform: translate(2px, 2px); filter: blur(1px); }
    98% { transform: translate(-2px, 0); color: var(--neon-yellow); }
    99% { transform: translate(0); filter: none; }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 3vw, 14px);
    color: var(--neon-pink);
    letter-spacing: 6px;
    text-shadow: 0 0 8px var(--neon-pink);
    margin-top: 12px;
    margin-bottom: 48px;
    text-align: center;
  }

  .neon-btn {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: clamp(14px, 4vw, 18px);
    letter-spacing: 4px;
    color: var(--dark-bg);
    background: var(--neon-cyan);
    border: none;
    padding: 18px 48px;
    cursor: pointer;
    pointer-events: all;
    box-shadow:
      0 0 20px var(--neon-cyan),
      0 0 60px rgba(0,255,255,0.4),
      inset 0 0 20px rgba(0,255,255,0.2);
    transition: all 0.15s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    -webkit-clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    text-transform: uppercase;
  }

  .neon-btn:active {
    transform: scale(0.96);
    box-shadow: 0 0 40px var(--neon-cyan), 0 0 100px rgba(0,255,255,0.6);
  }

  .neon-btn.pink {
    background: var(--neon-pink);
    color: white;
    box-shadow: 0 0 20px var(--neon-pink), 0 0 60px rgba(255,0,170,0.4);
  }

  .instructions {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(12px, 3.5vw, 15px);
    color: rgba(0,255,255,0.5);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 40px;
    line-height: 2;
  }

  #gameover-screen .big-score {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(64px, 20vw, 120px);
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow), 0 0 60px var(--neon-yellow);
    line-height: 1;
    margin: 8px 0;
  }

  #gameover-screen .score-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 3vw, 13px);
    color: rgba(255,255,0,0.5);
    letter-spacing: 6px;
    margin-bottom: 4px;
  }

  #gameover-screen .best-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(13px, 3.5vw, 16px);
    color: var(--neon-pink);
    letter-spacing: 4px;
    margin-bottom: 40px;
    text-shadow: 0 0 8px var(--neon-pink);
  }

  #gameover-screen .died-text {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: clamp(20px, 6vw, 30px);
    color: var(--neon-pink);
    text-shadow: 0 0 15px var(--neon-pink), 0 0 40px var(--neon-pink);
    letter-spacing: 6px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  #combo-display {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(32px, 10vw, 56px);
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow);
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: none;
    white-space: nowrap;
  }

  #combo-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 45;
    opacity: 0;
    mix-blend-mode: screen;
  }

  #flash-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 46;
    opacity: 0;
    background: white;
    transition: opacity 0.05s;
  }

  #streak-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 44;
    overflow: hidden;
  }

  .streak {
    position: absolute;
    height: 2px;
    border-radius: 2px;
    opacity: 0;
    animation: streakAnim 0.4s ease-out forwards;
  }

  @keyframes streakAnim {
    0%   { opacity: 1; transform: scaleX(0); transform-origin: left; }
    60%  { opacity: 1; transform: scaleX(1); }
    100% { opacity: 0; transform: scaleX(1); }
  }

  #combo-ring {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 0; height: 0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 43;
    transform: translate(-50%, -50%);
    border: 3px solid transparent;
    opacity: 0;
  }

  #wave-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(36px, 11vw, 64px);
    color: #00ffff;
    text-shadow: 0 0 20px #00ffff, 0 0 60px #00ffff;
    letter-spacing: 10px;
    pointer-events: none;
    z-index: 60;
    opacity: 0;
    text-align: center;
    white-space: nowrap;
  }

  #wave-sub {
    position: fixed;
    top: calc(50% + clamp(44px, 13vw, 76px));
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(12px, 3.5vw, 16px);
    color: #bf00ff;
    text-shadow: 0 0 10px #bf00ff;
    letter-spacing: 6px;
    pointer-events: none;
    z-index: 60;
    opacity: 0;
    text-align: center;
    white-space: nowrap;
  }

  /* Size bar bottom-left */
  #size-bar-wrap {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
    left: 16px;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #size-bar-wrap.visible { opacity: 1; }

  #size-bar-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(0,255,255,0.5);
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  #size-bar-track {
    width: 80px;
    height: 6px;
    background: rgba(0,255,255,0.1);
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 3px;
    overflow: hidden;
  }

  #size-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: linear-gradient(90deg, #00ffff, #bf00ff);
    box-shadow: 0 0 6px #00ffff;
    transition: width 0.4s ease, background 0.4s;
  }

  #wave-display {
    position: fixed;
    top: env(safe-area-inset-top, 16px);
    left: 16px;
    margin-top: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 3vw, 14px);
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff;
    letter-spacing: 2px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #wave-display.visible { opacity: 1; }

  #prestige-banner {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 65;
    opacity: 0;
    background: radial-gradient(ellipse at center, rgba(191,0,255,0.15) 0%, transparent 70%);
  }

  #prestige-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(40px, 13vw, 72px);
    color: #bf00ff;
    text-shadow: 0 0 20px #bf00ff, 0 0 60px #bf00ff, 0 0 120px #ff00aa;
    letter-spacing: 8px;
    text-align: center;
  }

  #prestige-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(12px, 3vw, 15px);
    color: #ff00aa;
    letter-spacing: 5px;
    margin-top: 10px;
    text-shadow: 0 0 10px #ff00aa;
  }

  #near-miss {
    position: fixed;
    top: 38%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(20px, 6vw, 32px);
    color: #ff6600;
    text-shadow: 0 0 12px #ff6600, 0 0 40px #ff6600;
    letter-spacing: 5px;
    pointer-events: none;
    z-index: 52;
    opacity: 0;
    white-space: nowrap;
  }

  #danger-ring {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 11;
    border: 3px solid transparent;
    opacity: 0;
    transition: opacity 0.1s;
  }

  /* CHAOS METER — bottom center */
  #chaos-wrap {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
    text-align: center;
  }
  #chaos-wrap.visible { opacity: 1; }
  #chaos-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    margin-bottom: 4px;
    color: #ff6600;
    text-shadow: 0 0 6px #ff6600;
    transition: color 0.5s, text-shadow 0.5s;
  }
  #chaos-track {
    width: 120px;
    height: 5px;
    background: rgba(255,100,0,0.1);
    border: 1px solid rgba(255,100,0,0.25);
    border-radius: 3px;
    overflow: hidden;
  }
  #chaos-fill {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: linear-gradient(90deg, #0088ff, #00ffff, #bf00ff, #ff6600, #ff2200);
    background-size: 500% 100%;
    background-position: 0% 0%;
    box-shadow: 0 0 6px #ff6600;
    transition: width 0.6s ease, background-position 0.6s ease;
  }
  #shield-hud {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
    right: 16px;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.4s;
    text-align: right;
  }
  #shield-hud.visible { opacity: 1; }

  #shield-hud-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: #ff00aa;
    letter-spacing: 3px;
    text-shadow: 0 0 6px #ff00aa;
    margin-bottom: 4px;
  }
  #shield-hud-pips {
    display: flex;
    gap: 5px;
    justify-content: flex-end;
    margin-bottom: 5px;
  }
  .shield-pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff00aa;
    box-shadow: 0 0 6px #ff00aa, 0 0 12px #ff00aa;
    transition: all 0.2s;
  }
  .shield-pip.empty {
    background: rgba(255,0,170,0.15);
    box-shadow: none;
    border: 1px solid rgba(255,0,170,0.3);
  }
  #shield-hud-track {
    width: 80px;
    height: 4px;
    background: rgba(255,0,170,0.15);
    border: 1px solid rgba(255,0,170,0.3);
    border-radius: 3px;
    overflow: hidden;
    margin-left: auto;
  }
  #shield-hud-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #ff00aa, #bf00ff);
    box-shadow: 0 0 6px #ff00aa;
    border-radius: 3px;
    transition: width 0.1s linear;
  }

  /* SHIELD ORB collectible */
  .shield-orb-pulse {
    animation: shieldOrbPulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes shieldOrbPulse {
    from { filter: drop-shadow(0 0 6px #ff00aa); }
    to   { filter: drop-shadow(0 0 20px #ff00aa) drop-shadow(0 0 40px #bf00ff); }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="scanlines"></div>
<div class="vignette"></div>

<div id="score-display">00000</div>
<div id="level-display">LVL 01</div>
<div id="wave-display">WAVE 1</div>
<div id="combo-display"></div>
<canvas id="combo-overlay"></canvas>
<div id="flash-overlay"></div>
<div id="streak-container"></div>
<div id="combo-ring"></div>

<div id="wave-banner"></div>
<div id="wave-sub"></div>

<div id="size-bar-wrap">
  <div id="size-bar-label">SHIP SIZE</div>
  <div id="size-bar-track"><div id="size-bar-fill"></div></div>
</div>

<div id="prestige-banner">
  <div id="prestige-title">PRESTIGE</div>
  <div id="prestige-sub">SHIP REBORN // POWER UP</div>
</div>

<div id="near-miss">⚡ NEAR MISS ⚡</div>
<div id="danger-ring"></div>

<!-- CHAOS METER -->
<div id="chaos-wrap">
  <div id="chaos-label">CHAOS</div>
  <div id="chaos-track"><div id="chaos-fill"></div></div>
</div>

<!-- SHIELD HUD -->
<div id="shield-hud">
  <div id="shield-hud-label">SHIELD</div>
  <div id="shield-hud-pips">
    <div class="shield-pip" id="pip-0"></div>
    <div class="shield-pip" id="pip-1"></div>
    <div class="shield-pip" id="pip-2"></div>
  </div>
  <div id="shield-hud-track"><div id="shield-hud-fill"></div></div>
</div>

<!-- START SCREEN -->
<div class="screen" id="start-screen">
  <div class="glitch-title">NEON<br>VOID</div>
  <div class="subtitle">// DODGE OR DIE //</div>
  <div class="instructions">
    DRAG TO MOVE YOUR SHIP<br>
    SURVIVE AS LONG AS YOU CAN
  </div>
  <button class="neon-btn" id="start-btn">JACK IN</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameover-screen">
  <div class="died-text">YOU FLATLINED</div>
  <div class="score-label">SCORE</div>
  <div class="big-score" id="final-score">0</div>
  <div class="best-score" id="best-score-display">BEST: 0</div>
  <button class="neon-btn pink" id="retry-btn">RETRY</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score-display');
const levelDisplay = document.getElementById('level-display');
const comboDisplay = document.getElementById('combo-display');
const startScreen = document.getElementById('start-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const finalScoreEl = document.getElementById('final-score');
const bestScoreEl = document.getElementById('best-score-display');

let W, H, dpr;
let gameState = 'start'; // start, playing, waveclear, dead
let score = 0, bestScore = 0, level = 1;
let frame = 0;
let animId;
let lastTime = 0;

// Wave system
let wave = 1;
let waveState = 'active'; // active, clearing, banner, paused
let waveClearTimer = 0;
let waveBannerTimer = 0;
const WAVE_DURATION = 18000; // ms to survive per wave
let waveStartTime = 0;
let waveTimer = 0; // ms elapsed this wave
let bulletsToSpawn = 0; // for clearing phase, unused
let waveClearing = false;

// Ship size / prestige
const SHIP_BASE_R_FACTOR = 0.028;
const SHIP_MAX_STAGES = 5; // grow 5 times before prestige
let shipStage = 0; // 0..4
let prestigeCount = 0;
const SHIP_GROW_FACTORS = [1, 1.35, 1.75, 2.2, 2.8];
// Color per stage: cyan, green, yellow, orange, pink
const SHIP_COLORS = ['#00ffff','#00ff88','#ffff00','#ff8800','#ff00aa'];

// Player
let player = {};
let touch = { x: 0, y: 0, active: false };

// Game objects
let bullets = [], particles = [], stars = [], orbs = [];
let shockwaves = [];

// Timing
let spawnInterval = 900;
let lastSpawn = 0;
let orbSpawnInterval = 3000;
let lastOrbSpawn = 0;
let invincible = false;
let invincibleTimer = 0;

// Shield system
const SHIELD_DURATION = 600; // frames (~10s at 60fps)
const SHIELD_MAX_HITS = 3;
let shieldActive = false;
let shieldTimer = 0;
let shieldHits = 0;          // hits absorbed so far
let shieldOrbs = [];         // collectible shield orbs on screen
let shieldOrbPending = false;// prevent double-spawning

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  initStars();
  if (gameState !== 'playing') return;
  player.x = Math.min(Math.max(player.x, player.r), W - player.r);
  player.y = Math.min(Math.max(player.y, player.r), H - player.r);
}

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      speed: Math.random() * 0.4 + 0.05,
      alpha: Math.random() * 0.6 + 0.1
    });
  }
}

function initGame() {
  score = 0; level = 1; frame = 0;
  bullets = []; particles = []; orbs = []; shockwaves = [];
  spawnInterval = 900;
  lastSpawn = 0; lastOrbSpawn = 0;
  invincible = false; invincibleTimer = 0;
  shieldActive = false; shieldTimer = 0; shieldHits = 0;
  shieldOrbs = []; shieldOrbPending = false;
  chargeUps = [];
  wave = 1; waveState = 'active'; waveClearing = false;
  waveStartTime = performance.now(); waveTimer = 0;
  shipStage = 0; prestigeCount = 0;
  chaosLevel = 0; chaosLoopCount = 0; lastChaosShift = 0;
  spawnInterval = 900;

  player = {
    x: W / 2, y: H * 0.55,
    r: Math.min(W, H) * SHIP_BASE_R_FACTOR * SHIP_GROW_FACTORS[0],
    targetX: W / 2, targetY: H * 0.55,
    trail: []
  };
  touch = { x: W / 2, y: H * 0.65, active: false, vx: 0, vy: 0, px: W/2, py: H*0.65 };
  scoreDisplay.textContent = '00000';
  scoreDisplay.classList.add('visible');
  levelDisplay.classList.add('visible');
  levelDisplay.textContent = 'LVL 01';
  document.getElementById('wave-display').classList.add('visible');
  document.getElementById('wave-display').textContent = 'WAVE 1';
  document.getElementById('size-bar-wrap').classList.add('visible');
  chaosWrapEl.classList.add('visible');
  updateSizeBar();
  initNebulas();
  initRunes();
  cometTrails = [];
  gridSparks = [];
  lightningArcs = [];
  nearMissCooldown = 0;
  gameState = 'playing';
}

// --- NEBULA CLOUDS ---
let nebulas = [];
function initNebulas() {
  nebulas = [];
  const colors = ['#ff00aa','#00ffff','#bf00ff','#ff6600','#00ff88'];
  for (let i = 0; i < 5; i++) {
    nebulas.push({
      x: Math.random() * W,
      y: Math.random() * H,
      rx: Math.random() * 120 + 60,
      ry: Math.random() * 80 + 40,
      color: colors[i % colors.length],
      phase: Math.random() * Math.PI * 2,
      speed: (Math.random() - 0.5) * 0.003,
      dx: (Math.random() - 0.5) * 0.15,
      dy: (Math.random() - 0.5) * 0.08,
    });
  }
}

function drawNebulas(now) {
  nebulas.forEach(n => {
    n.x += n.dx; n.y += n.dy;
    if (n.x < -150) n.x = W + 150;
    if (n.x > W + 150) n.x = -150;
    if (n.y < -100) n.y = H + 100;
    if (n.y > H + 100) n.y = -100;
    const pulse = Math.sin(now * n.speed + n.phase) * 0.5 + 0.5;
    const alpha = 0.025 + pulse * 0.03;
    const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.rx);
    grd.addColorStop(0, hexToRgba(n.color, alpha));
    grd.addColorStop(1, hexToRgba(n.color, 0));
    ctx.save();
    ctx.scale(1, n.ry / n.rx);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(n.x, n.y * (n.rx / n.ry), n.rx, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// --- FLOATING NEON RUNES ---
const RUNES = ['⬡','◈','⟁','⬢','◉','⬟','⟐','◎','⬠','⟴'];
let runeObjs = [];
function initRunes() {

// --- LIGHTNING ARCS ---
let lightningArcs = [];
function spawnLightning(x1, y1, x2, y2, color) {
  const segs = [];
  const steps = 8;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const mx = x1 + (x2 - x1) * t + (i > 0 && i < steps ? (Math.random() - 0.5) * 30 : 0);
    const my = y1 + (y2 - y1) * t + (i > 0 && i < steps ? (Math.random() - 0.5) * 30 : 0);
    segs.push({ x: mx, y: my });
  }
  lightningArcs.push({ segs, color, life: 1, decay: 0.12 });
}
function drawLightning() {
  lightningArcs = lightningArcs.filter(arc => {
    ctx.save();
    ctx.globalAlpha = arc.life * 0.7;
    ctx.strokeStyle = arc.color;
    ctx.shadowColor = arc.color;
    ctx.shadowBlur = 10;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    arc.segs.forEach((s, i) => i === 0 ? ctx.moveTo(s.x, s.y) : ctx.lineTo(s.x, s.y));
    ctx.stroke();
    ctx.restore();
    arc.life -= arc.decay;
    return arc.life > 0;
  });
}

// --- NEAR MISS SYSTEM ---
const nearMissEl = document.getElementById('near-miss');
const dangerRingEl = document.getElementById('danger-ring');
let nearMissCooldown = 0;
let closestBulletDist = Infinity;

function checkNearMiss() {
  closestBulletDist = Infinity;
  bullets.forEach(b => {
    const d = dist(b, player) - b.r - player.r;
    if (d < closestBulletDist) closestBulletDist = d;
  });

  const DANGER_ZONE = player.r * 5;
  const NEAR_MISS_ZONE = player.r * 2.2;

  // Danger ring — pulsing border when bullets close
  if (closestBulletDist < DANGER_ZONE && closestBulletDist > 0) {
    const intensity = 1 - (closestBulletDist / DANGER_ZONE);
    dangerRingEl.style.opacity = String(intensity * 0.6);
    dangerRingEl.style.boxShadow = `inset 0 0 ${30 * intensity}px #ff0044, inset 0 0 ${60 * intensity}px rgba(255,0,68,0.3)`;
    dangerRingEl.style.borderColor = `rgba(255,0,68,${intensity * 0.8})`;
  } else {
    dangerRingEl.style.opacity = '0';
  }

  // Near miss popup
  if (closestBulletDist > 0 && closestBulletDist < NEAR_MISS_ZONE && nearMissCooldown <= 0 && !invincible) {
    nearMissCooldown = 90;
    addScore(5);
    nearMissEl.style.animation = 'none';
    void nearMissEl.offsetWidth;
    nearMissEl.style.animation = 'nearMissAnim 0.9s ease-out forwards';
    // Lightning between ship and nearest bullet
    const nb = bullets.reduce((closest, b) => dist(b, player) < dist(closest, player) ? b : closest, bullets[0]);
    if (nb) spawnLightning(player.x, player.y, nb.x, nb.y, '#ff6600');
  }
  if (nearMissCooldown > 0) nearMissCooldown--;
}

// --- CHAOS ESCALATION ENGINE ---
// chaosLevel 0..1 grows over time. Controls pattern weights, speed, count, multi-fire.
let chaosLevel = 0;
let chaosLoopCount = 0; // how many times chaos has maxed and reset (for permanent baseline bump)
let lastChaosShift = 0;
const CHAOS_RAMP_INTERVAL = 12000; // ms between chaos ticks

// Speed → color: slow=blue, mid=cyan/purple, fast=orange, max=red
function speedToColor(spd, baseSpeed) {
  const norm = Math.min((spd - baseSpeed * 0.7) / (baseSpeed * 1.8), 1);
  if (norm < 0.25) return { color: '#0088ff', glow: '#0088ff' };     // slow - blue
  if (norm < 0.5)  return { color: '#00ffff', glow: '#00ffff' };     // med  - cyan
  if (norm < 0.75) return { color: '#bf00ff', glow: '#bf00ff' };     // high - purple
  if (norm < 0.9)  return { color: '#ff6600', glow: '#ff6600' };     // fast - orange
  return { color: '#ff2200', glow: '#ff0000' };                       // max  - red
}

function getChaosWeights() {
  // As chaos rises: scatter/aimed become less dominant, harder patterns get more weight
  // weights: [scatter, aimed, spiral, ring, cross, doubleSpiral, pinwheel, storm]
  const c = chaosLevel;
  return [
    Math.max(5,  40 - c * 32),   // scatter  — fades out
    Math.max(8,  30 - c * 18),   // aimed    — stays relevant
    Math.min(25,  8 + c * 20),   // spiral   — grows
    Math.min(20,  5 + c * 18),   // ring     — grows
    Math.min(18,  3 + c * 16),   // cross    — grows
    Math.min(15,  0 + c * 15),   // doubleSpiral — unlocks mid chaos
    Math.min(12,  0 + c * 12),   // pinwheel — unlocks high chaos
    Math.min(10,  0 + c * 10),   // storm    — unlocks near max chaos
  ];
}

function pickPattern() {
  const weights = getChaosWeights();
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) return i;
  }
  return 0;
}

// Permanent baseline speed bumps each chaos loop
function getBaseSpeed() {
  return 2.0 + chaosLoopCount * 0.4 + chaosLevel * 2.2;
}

// Sometimes fire multiple patterns at once at high chaos
function getMultiFireCount() {
  if (chaosLevel < 0.65) return 1;
  if (chaosLevel < 0.85) return Math.random() < 0.2 ? 2 : 1;
  return Math.random() < 0.25 ? 2 : 1;
}

function tickChaos(now) {
  if (now - lastChaosShift < CHAOS_RAMP_INTERVAL) return;
  lastChaosShift = now;
  chaosLevel = Math.min(1, chaosLevel + 0.07 + Math.random() * 0.05);
  // Occasionally random spike then settle
  if (Math.random() < 0.15) {
    const spike = Math.min(1, chaosLevel + 0.2);
    const prev = chaosLevel;
    chaosLevel = spike;
    setTimeout(() => { chaosLevel = Math.max(prev, chaosLevel - 0.1); }, 4000);
  }
  if (chaosLevel >= 1) {
    // Reset with permanent bump
    chaosLevel = 0.2;
    chaosLoopCount++;
  }
}

function makeBullet(x, y, vx, vy, r, speed) {
  const baseSpeed = getBaseSpeed();
  const actualSpeed = Math.sqrt(vx*vx + vy*vy);
  const { color, glow } = speedToColor(actualSpeed, baseSpeed);
  return { x, y, vx, vy, r, color, glow };
}

function spawnSinglePattern(patternIdx, speed) {
  const c = chaosLevel;

  if (patternIdx === 0) {
    // SCATTER — random spread from top
    const count = Math.round(2 + c * 3 + Math.random() * 1);
    for (let i = 0; i < count; i++) {
      const x = Math.random() * W * 0.85 + W * 0.075;
      const spread = 0.5 + c * 0.8;
      const ang = Math.PI / 2 + (Math.random() - 0.5) * spread;
      const spd = speed * (0.85 + Math.random() * 0.3);
      bullets.push(makeBullet(x, -10, Math.cos(ang)*spd, Math.sin(ang)*spd, 10, speed));
    }

  } else if (patternIdx === 1) {
    // AIMED — homing toward player with slight jitter
    const count = Math.round(1 + c * 3);
    const jitter = 80 - c * 60;
    for (let i = 0; i < count; i++) {
      const sx = Math.random() * W;
      const sy = Math.random() < 0.7 ? -10 : -10;
      const dx = player.x - sx + (Math.random()-0.5)*jitter;
      const dy = player.y - sy + (Math.random()-0.5)*jitter;
      const d = Math.sqrt(dx*dx+dy*dy);
      const spd = speed * (0.9 + Math.random() * 0.25);
      bullets.push(makeBullet(sx, sy, dx/d*spd, dy/d*spd, 12, speed));
    }

  } else if (patternIdx === 2) {
    // SPIRAL — rotating burst from center-top
    const count = Math.round(4 + c * 4);
    const baseAng = frame * (0.04 + c * 0.04);
    for (let i = 0; i < count; i++) {
      const ang = baseAng + (i / count) * Math.PI * 2;
      const spd = speed * (1.0 + c * 0.2);
      bullets.push(makeBullet(W/2, H*0.12, Math.cos(ang)*spd, Math.sin(ang)*spd, 9, speed));
    }

  } else if (patternIdx === 3) {
    // RING — expanding circle
    const count = Math.round(6 + c * 5);
    const ox = W * (0.2 + Math.random() * 0.6);
    const oy = H * (0.05 + Math.random() * 0.25);
    for (let i = 0; i < count; i++) {
      const ang = (i / count) * Math.PI * 2;
      const spd = speed * (0.9 + c * 0.2);
      bullets.push(makeBullet(ox, oy, Math.cos(ang)*spd, Math.sin(ang)*spd, 9, speed));
    }

  } else if (patternIdx === 4) {
    // CROSS — 8-way + diagonals at high chaos
    const extraDirs = c > 0.6 ? [Math.PI/8, Math.PI*3/8, Math.PI*5/8, Math.PI*7/8, Math.PI*9/8, Math.PI*11/8, Math.PI*13/8, Math.PI*15/8] : [];
    const dirs = [0, Math.PI/2, Math.PI, Math.PI*1.5, Math.PI/4, Math.PI*3/4, Math.PI*5/4, Math.PI*7/4, ...extraDirs];
    dirs.forEach(ang => {
      const spd = speed * (1.1 + c * 0.3);
      bullets.push(makeBullet(W/2, H/2, Math.cos(ang)*spd, Math.sin(ang)*spd, 11, speed));
    });

  } else if (patternIdx === 5) {
    // DOUBLE SPIRAL — two counter-rotating arms
    const count = Math.round(4 + c * 4);
    const baseAng = frame * 0.05;
    for (let i = 0; i < count; i++) {
      const ang1 = baseAng + (i / count) * Math.PI * 2;
      const ang2 = -baseAng + (i / count) * Math.PI * 2;
      const spd = speed * 1.1;
      const ox = W/2 + (Math.random()-0.5)*40;
      const oy = H * 0.15;
      bullets.push(makeBullet(ox, oy, Math.cos(ang1)*spd, Math.sin(ang1)*spd, 9, speed));
      bullets.push(makeBullet(ox, oy, Math.cos(ang2)*spd, Math.sin(ang2)*spd, 9, speed));
    }

  } else if (patternIdx === 6) {
    // PINWHEEL — 3 rotating fan bursts from different edges
    const origins = [
      { x: W*0.2, y: -10 }, { x: W*0.8, y: -10 }, { x: W/2, y: H*0.05 }
    ];
    origins.forEach((o, oi) => {
      const count = Math.round(3 + c * 2);
      const baseAng = frame * 0.06 + oi * Math.PI * 2 / 3;
      for (let i = 0; i < count; i++) {
        const ang = baseAng + (i / count) * Math.PI;
        const spd = speed * (0.95 + Math.random() * 0.2);
        bullets.push(makeBullet(o.x, o.y, Math.cos(ang)*spd, Math.sin(ang)*spd, 9, speed));
      }
    });

  } else if (patternIdx === 7) {
    // STORM — dense multi-origin chaos barrage
    const origins = 2 + Math.floor(c * 2);
    for (let o = 0; o < origins; o++) {
      const ox = Math.random() * W;
      const oy = Math.random() < 0.6 ? -10 : Math.random() * H * 0.3;
      const count = Math.round(2 + c * 3);
      for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const spd = speed * (0.8 + Math.random() * 0.5);
        bullets.push(makeBullet(ox, oy, Math.cos(ang)*spd, Math.sin(ang)*spd, 10, speed));
      }
    }
  }
}

// --- CHARGE-UP TELEGRAPH SYSTEM ---
// Patterns that fire from visible screen positions get a warning charge first
let chargeUps = []; // { x, y, timer, maxTimer, patternIdx, speed, color }

const CHARGE_TIME = 55; // frames (~0.9s warning)

// Which patterns need a telegraph (fire from on-screen)
const NEEDS_CHARGE = new Set([2, 3, 4, 5, 6]);

// Color per pattern type for the charge glow
const CHARGE_COLORS = {
  2: '#00ffff',  // spiral
  3: '#ffff00',  // ring
  4: '#ff6600',  // cross
  5: '#00ffff',  // double spiral
  6: '#bf00ff',  // pinwheel
  7: '#ff2200',  // storm
};

function queuePattern(patternIdx, speed) {
  if (!NEEDS_CHARGE.has(patternIdx)) {
    // Fires from off-screen — no warning needed, fire immediately
    spawnSinglePattern(patternIdx, speed);
    return;
  }

  // Determine origin point for this pattern
  let ox = W / 2, oy = H * 0.12;
  if (patternIdx === 3) { ox = W * (0.2 + Math.random() * 0.6); oy = H * (0.05 + Math.random() * 0.25); }
  if (patternIdx === 4) { ox = W / 2; oy = H / 2; }

  chargeUps.push({
    x: ox, y: oy,
    timer: CHARGE_TIME,
    maxTimer: CHARGE_TIME,
    patternIdx,
    speed,
    color: CHARGE_COLORS[patternIdx] || '#ffffff',
    angle: Math.random() * Math.PI * 2,
  });
}

function updateChargeUps() {
  chargeUps = chargeUps.filter(c => {
    c.timer--;
    c.angle += 0.12;
    if (c.timer <= 0) {
      spawnSinglePattern(c.patternIdx, c.speed);
      return false;
    }
    return true;
  });
}

function drawChargeUps(now) {
  chargeUps.forEach(c => {
    const t = 1 - (c.timer / c.maxTimer); // 0→1 as charge builds
    const pulse = Math.sin(now * 0.015) * 0.5 + 0.5;

    // Expanding + contracting rings that tighten as charge peaks
    const maxRing = 60 + (1 - t) * 40;
    const ringCount = 3;
    for (let r = 0; r < ringCount; r++) {
      const phase = ((t * 2 + r / ringCount) % 1);
      const radius = maxRing * (1 - phase);
      const alpha = phase * 0.7 * t;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = c.color;
      ctx.lineWidth = 2 - phase;
      ctx.beginPath();
      ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Core glow — grows as charge builds
    const coreR = 6 + t * 18;
    const grd = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, coreR * 2.5);
    grd.addColorStop(0, hexToRgba(c.color, 0.8 * t));
    grd.addColorStop(1, hexToRgba(c.color, 0));
    ctx.globalAlpha = 1;
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(c.x, c.y, coreR * 2.5, 0, Math.PI * 2); ctx.fill();

    // Bright center dot
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.6 + t * 0.4;
    ctx.beginPath(); ctx.arc(c.x, c.y, 3 + t * 5, 0, Math.PI * 2); ctx.fill();

    // Spinning particle sparks around the charge
    const sparkCount = Math.floor(4 + t * 8);
    for (let s = 0; s < sparkCount; s++) {
      const ang = c.angle + (s / sparkCount) * Math.PI * 2;
      const dist = (8 + t * 22) * (0.8 + pulse * 0.2);
      const sx = c.x + Math.cos(ang) * dist;
      const sy = c.y + Math.sin(ang) * dist;
      ctx.globalAlpha = t * 0.9;
      ctx.fillStyle = c.color;
      ctx.beginPath(); ctx.arc(sx, sy, 2 + t * 2, 0, Math.PI * 2); ctx.fill();
    }

    // WARNING label at 70%+ charge
    if (t > 0.65) {
      ctx.globalAlpha = (t - 0.65) / 0.35;
      ctx.fillStyle = c.color;
      ctx.font = `700 ${Math.floor(10 + t * 6)}px 'Share Tech Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText('⚠ INCOMING', c.x, c.y - 28 - t * 8);
    }

    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  });
}

function spawnBullets(now) {
  tickChaos(now);
  const speed = getBaseSpeed();
  const fires = getMultiFireCount();
  for (let f = 0; f < fires; f++) {
    queuePattern(pickPattern(), speed * (f > 0 ? 0.85 : 1));
  }
}

function spawnOrb(now) {
  orbs.push({
    x: Math.random() * W * 0.7 + W * 0.15,
    y: Math.random() * H * 0.4 + H * 0.1,
    r: 10,
    life: 4000,
    born: now,
    pulse: Math.random() * Math.PI * 2
  });
}

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      r: Math.random() * 3 + 1,
      life: 1,
      color,
      decay: Math.random() * 0.03 + 0.02
    });
  }
}

function spawnShockwave(x, y, color) {
  shockwaves.push({ x, y, r: 0, maxR: 60, color, life: 1 });
}

// --- DRAW ---
// Pre-render grid to offscreen canvas — only rebuild when scroll offset changes
let gridCanvas = null, gridCtx2 = null, lastGridOffset = -1;
function drawGrid() {
  const spacing = 40;
  const offset = Math.floor((frame * 0.5) % spacing);
  if (!gridCanvas || gridCanvas.width !== W || gridCanvas.height !== H) {
    gridCanvas = document.createElement('canvas');
    gridCanvas.width = W; gridCanvas.height = H;
    gridCtx2 = gridCanvas.getContext('2d');
    lastGridOffset = -1;
  }
  if (offset !== lastGridOffset) {
    lastGridOffset = offset;
    gridCtx2.clearRect(0, 0, W, H);
    gridCtx2.strokeStyle = 'rgba(0,255,255,0.04)';
    gridCtx2.lineWidth = 0.5;
    gridCtx2.beginPath();
    for (let y = -spacing + offset; y < H + spacing; y += spacing) {
      gridCtx2.moveTo(0, y); gridCtx2.lineTo(W, y);
    }
    for (let x = 0; x < W + spacing; x += spacing) {
      gridCtx2.moveTo(x, 0); gridCtx2.lineTo(x, H);
    }
    gridCtx2.stroke();
  }
  ctx.drawImage(gridCanvas, 0, 0);
}

function drawStars() {
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Safe hex-to-rgba — no regex replace chains, works on all browsers
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
}

// Ship glow sprite cache — pre-rendered per stage+color
const shipGlowCache = {};
function getShipGlow(color, r, stage) {
  const key = color + Math.round(r) + stage;
  if (shipGlowCache[key]) return shipGlowCache[key];
  const sz = Math.ceil(r * 6);
  const oc = document.createElement('canvas');
  oc.width = sz; oc.height = sz;
  const oc2 = oc.getContext('2d');
  const cx = sz / 2;
  const grd = oc2.createRadialGradient(cx, cx, 0, cx, cx, sz/2);
  grd.addColorStop(0, hexToRgba(color, 0.5));
  grd.addColorStop(0.4, hexToRgba(color, 0.2));
  grd.addColorStop(1, hexToRgba(color, 0));
  oc2.fillStyle = grd;
  oc2.fillRect(0, 0, sz, sz);
  shipGlowCache[key] = oc;
  return oc;
}

function drawPlayer() {
  const p = player;
  const shipColor = SHIP_COLORS[shipStage % SHIP_COLORS.length];
  const flashing = invincible && Math.floor(frame / 4) % 2 === 0;
  if (flashing) ctx.globalAlpha = 0.35;

  // Trail — batch all in one path per opacity level
  p.trail.push({ x: p.x, y: p.y });
  if (p.trail.length > 14) p.trail.shift();
  ctx.fillStyle = shipColor;
  p.trail.forEach((pt, i) => {
    ctx.globalAlpha = (i / p.trail.length) * (flashing ? 0.15 : 0.35);
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, p.r * 0.3 * (i / p.trail.length), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = flashing ? 0.35 : 1;

  // Glow — pre-rendered sprite, no shadowBlur
  const gc = getShipGlow(shipColor, p.r * 2.8, shipStage);
  const gsz = gc.width;
  ctx.globalAlpha = flashing ? 0.1 : 0.5;
  ctx.drawImage(gc, p.x - gsz/2, p.y - gsz/2, gsz, gsz);
  ctx.globalAlpha = flashing ? 0.35 : 1;

  // Ship body — no shadowBlur, draw two overlapping strokes for glow illusion
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.strokeStyle = hexToRgba(shipColor, 0.3);
  ctx.lineWidth = (1.5 + shipStage * 0.4) * 3.5;
  ctx.fillStyle = hexToRgba(shipColor, 0.12);
  ctx.beginPath();
  ctx.moveTo(0, -p.r * 1.3);
  ctx.lineTo(p.r * 0.8, p.r * 0.8);
  ctx.lineTo(0, p.r * 0.4);
  ctx.lineTo(-p.r * 0.8, p.r * 0.8);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Crisp inner stroke
  ctx.strokeStyle = shipColor;
  ctx.lineWidth = 1.5 + shipStage * 0.4;
  ctx.beginPath();
  ctx.moveTo(0, -p.r * 1.3);
  ctx.lineTo(p.r * 0.8, p.r * 0.8);
  ctx.lineTo(0, p.r * 0.4);
  ctx.lineTo(-p.r * 0.8, p.r * 0.8);
  ctx.closePath();
  ctx.stroke();

  // Stage 2+: wing fins
  if (shipStage >= 1) {
    ctx.strokeStyle = shipColor; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.r * 0.8, p.r * 0.8); ctx.lineTo(p.r * 1.5, p.r * 1.2); ctx.lineTo(p.r * 0.4, p.r * 0.3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-p.r * 0.8, p.r * 0.8); ctx.lineTo(-p.r * 1.5, p.r * 1.2); ctx.lineTo(-p.r * 0.4, p.r * 0.3);
    ctx.stroke();
  }
  // Stage 3+: wing tips
  if (shipStage >= 2) {
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(p.r * 1.5, p.r * 1.2); ctx.lineTo(p.r * 2.0, p.r * 0.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-p.r * 1.5, p.r * 1.2); ctx.lineTo(-p.r * 2.0, p.r * 0.6); ctx.stroke();
  }
  // Stage 4+: cannon
  if (shipStage >= 3) {
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, -p.r * 1.3); ctx.lineTo(0, -p.r * 2.0); ctx.stroke();
    ctx.fillStyle = shipColor;
    ctx.beginPath(); ctx.arc(0, -p.r * 2.0, p.r * 0.18, 0, Math.PI * 2); ctx.fill();
  }
  // Stage 5: halo ring
  if (shipStage >= 4) {
    ctx.strokeStyle = hexToRgba(shipColor, 0.5 + Math.sin(frame * 0.08) * 0.3);
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, p.r * 2.3, 0, Math.PI * 2); ctx.stroke();
  }
  // White core dot
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(0, 0, p.r * 0.22, 0, Math.PI * 2); ctx.fill();

  // True hitbox ring — small, shows actual collision zone
  ctx.strokeStyle = hexToRgba(shipColor, 0.25);
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 4]);
  ctx.beginPath(); ctx.arc(0, 0, p.r * 0.55, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
  ctx.globalAlpha = 1;

  // Touch point indicator — shows where finger is registered, below the ship
  if (touch.active) {
    const tx = touch.x, ty = touch.y;
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    // Small crosshair
    ctx.beginPath(); ctx.moveTo(tx - 8, ty); ctx.lineTo(tx + 8, ty); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx, ty - 8); ctx.lineTo(tx, ty + 8); ctx.stroke();
    // Circle
    ctx.beginPath(); ctx.arc(tx, ty, 14, 0, Math.PI * 2); ctx.stroke();
    // Dotted line from touch to ship
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(p.x, p.y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }
}

// Bullet glow offscreen canvas — pre-rendered once per color group
const BULLET_COLORS_LIST = ['#0088ff','#00ffff','#bf00ff','#ff6600','#ff2200','#ff00aa','#ffff00'];
const bulletGlowCache = {};
function getBulletGlowCanvas(color, r) {
  const key = color + r;
  if (bulletGlowCache[key]) return bulletGlowCache[key];
  const sz = Math.ceil(r * 5);
  const oc = document.createElement('canvas');
  oc.width = sz; oc.height = sz;
  const oc2 = oc.getContext('2d');
  const cx = sz / 2;
  const grd = oc2.createRadialGradient(cx, cx, 0, cx, cx, sz / 2);
  grd.addColorStop(0, color + 'cc');
  grd.addColorStop(0.4, color + '66');
  grd.addColorStop(1, color + '00');
  oc2.fillStyle = grd;
  oc2.beginPath(); oc2.arc(cx, cx, sz/2, 0, Math.PI*2); oc2.fill();
  bulletGlowCache[key] = oc;
  return oc;
}

function drawBullets() {
  if (bullets.length === 0) return;

  // Group bullets by color for batch rendering
  const groups = {};
  bullets.forEach(b => {
    if (!groups[b.color]) groups[b.color] = [];
    groups[b.color].push(b);
  });

  Object.entries(groups).forEach(([color, group]) => {
    // Draw glows first (no shadowBlur needed — use pre-rendered glow sprite)
    group.forEach(b => {
      const gc = getBulletGlowCanvas(color, b.r);
      const sz = gc.width;
      ctx.globalAlpha = 0.55;
      ctx.drawImage(gc, b.x - sz/2, b.y - sz/2, sz, sz);
    });
    ctx.globalAlpha = 1;

    // Draw all bullet cores in one batched path per color
    ctx.fillStyle = color;
    group.forEach(b => {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // White cores batched
    ctx.fillStyle = '#ffffff';
    group.forEach(b => {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r * 0.38, 0, Math.PI * 2);
      ctx.fill();
    });
  });
  ctx.globalAlpha = 1;
}

function drawOrbs(now) {
  orbs.forEach(o => {
    const age = (now - o.born) / o.life;
    const pulse = Math.sin(now * 0.005 + o.pulse) * 0.3 + 0.7;
    const alpha = (1 - age * 0.4) * pulse;
    ctx.globalAlpha = alpha;
    // Glow via radial gradient — no shadowBlur
    const grd = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r * 2.2);
    grd.addColorStop(0, 'rgba(255,255,0,0.5)');
    grd.addColorStop(1, 'rgba(255,255,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 2.2, 0, Math.PI * 2); ctx.fill();
    // Outer ring
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 1.5, 0, Math.PI * 2); ctx.stroke();
    // Inner core
    ctx.fillStyle = '#ffff00';
    ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 0.6, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawShockwaves() {
  if (shockwaves.length === 0) return;
  shockwaves.forEach(s => {
    ctx.globalAlpha = s.life * 0.6;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.stroke();
  });
  ctx.globalAlpha = 1;
}

// --- BACKGROUND FLICKER ---
let bgFlash = 0;
let bgFlashColor = '#ffffff';

function drawBackground() {
  const r = bgFlash > 0 ? 0.6 : 0.88;
  ctx.fillStyle = `rgba(3,0,8,${r})`;
  ctx.fillRect(0, 0, W, H);

  // Colored tint overlay on flash
  if (bgFlash > 0.1) {
    ctx.fillStyle = hexToRgba(bgFlashColor, bgFlash * 0.08);
    ctx.fillRect(0, 0, W, H);
    bgFlash -= 0.04;
  } else if (bgFlash > 0) {
    bgFlash -= 0.04;
  }

  // Wave progress bar — top of screen, no shadowBlur
  if (gameState === 'playing' && !waveClearing) {
    const pct = Math.min(waveTimer / WAVE_DURATION, 1);
    const shipColor = SHIP_COLORS[shipStage % SHIP_COLORS.length];
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(0, 0, W, 3);
    ctx.fillStyle = shipColor;
    ctx.fillRect(0, 0, W * pct, 3);
  }
}

// Chromatic glitch lines across the screen
let chromaticLines = [];
let chromaticTimer = 0;

function triggerChromaticGlitch(colors, intensity) {
  chromaticLines = [];
  const count = Math.floor(intensity * 12) + 3;
  for (let i = 0; i < count; i++) {
    chromaticLines.push({
      y: Math.random() * window.innerHeight,
      h: Math.random() * 8 + 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: Math.random() * 0.7 + 0.3,
      life: 1,
      decay: Math.random() * 0.08 + 0.04,
      offsetX: (Math.random() - 0.5) * 40 * intensity
    });
  }
  chromaticTimer = Math.floor(intensity * 10) + 4;
}

function drawChromaticOverlay() {
  coctx.clearRect(0, 0, comboOverlayCanvas.width, comboOverlayCanvas.height);
  if (chromaticLines.length === 0) {
    comboOverlayCanvas.style.opacity = '0';
    return;
  }
  comboOverlayCanvas.style.opacity = '1';
  chromaticLines.forEach(l => {
    coctx.globalAlpha = l.alpha * l.life;
    coctx.fillStyle = l.color;
    coctx.fillRect(l.offsetX, l.y, comboOverlayCanvas.width, l.h);
    l.life -= l.decay;
  });
  chromaticLines = chromaticLines.filter(l => l.life > 0);
  coctx.globalAlpha = 1;
}

// Screen edge burst
function triggerEdgeBurst(colors, intensity) {
  const streaks = Math.floor(intensity * 20) + 8;
  for (let i = 0; i < streaks; i++) {
    const el = document.createElement('div');
    el.className = 'streak';
    const fromEdge = Math.random() < 0.5;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const w = Math.random() * 40 * intensity + 20;
    const y = Math.random() * 100;
    el.style.cssText = `
      width: ${w}vw;
      top: ${y}%;
      left: ${fromEdge ? '0' : 'auto'};
      right: ${fromEdge ? 'auto' : '0'};
      background: linear-gradient(${fromEdge ? '90deg' : '270deg'}, ${color}, transparent);
      box-shadow: 0 0 8px ${color};
      animation-delay: ${Math.random() * 0.1}s;
    `;
    streakContainer.appendChild(el);
    setTimeout(() => el.remove(), 500);
  }
}

// Ring pulse
function triggerRingPulse(x, y, colors, intensity) {
  const rings = Math.floor(intensity * 3) + 1;
  for (let r = 0; r < rings; r++) {
    const el = document.createElement('div');
    const size = (r + 1) * 60 * intensity;
    const color = colors[r % colors.length];
    el.style.cssText = `
      position: fixed;
      left: ${x}px; top: ${y}px;
      width: ${size}px; height: ${size}px;
      border-radius: 50%;
      border: 3px solid ${color};
      box-shadow: 0 0 20px ${color}, inset 0 0 20px ${color}40;
      transform: translate(-50%, -50%) scale(0);
      opacity: 1;
      pointer-events: none;
      z-index: 43;
      transition: transform ${0.4 + r * 0.1}s ease-out, opacity ${0.4 + r * 0.1}s ease-out;

      el.style.transform = 'translate(-50%, -50%) scale(1)';

}

  // Score popup

// --- WARP SCENE ---
let warpActive = false;
let warpTimer = 0;
const WARP_DURATION = 120; // frames
let warpStreaks = [];
let warpColor1 = '#00ffff';
let warpColor2 = '#bf00ff';
const WARP_COLORS = [
  ['#00ffff','#bf00ff'],
  ['#ff00aa','#ffff00'],
  ['#00ff88','#0088ff'],
  ['#ff6600','#ff00aa'],
  ['#ffffff','#00ffff'],
];

function startWarp(waveNum) {
  warpActive = true;
  warpTimer = WARP_DURATION;
  const ci = waveNum % WARP_COLORS.length;
  warpColor1 = WARP_COLORS[ci][0];
  warpColor2 = WARP_COLORS[ci][1];
  // Generate warp streaks radiating from center
  warpStreaks = [];
  for (let i = 0; i < 120; i++) {
    const ang = Math.random() * Math.PI * 2;
    const dist = Math.random() * 80 + 20;
    warpStreaks.push({
      ang,
      startDist: dist,
      speed: 8 + Math.random() * 18,
      len: 30 + Math.random() * 80,
      width: 0.5 + Math.random() * 1.5,
      color: Math.random() < 0.5 ? warpColor1 : warpColor2,
      alpha: 0.4 + Math.random() * 0.6,
      curDist: dist,
    });
  }
}

function drawWarp(now) {
  if (!warpActive) return;
  const t = 1 - (warpTimer / WARP_DURATION); // 0→1
  const cx = W / 2, cy = H / 2;

  // Dark overlay that fades in then out
  const overlayAlpha = t < 0.3 ? t / 0.3 * 0.85 : t > 0.75 ? (1 - t) / 0.25 * 0.85 : 0.85;
  ctx.fillStyle = `rgba(0,0,0,${overlayAlpha})`;
  ctx.fillRect(0, 0, W, H);

  // Tunnel gradient rings
  const ringCount = 5;
  for (let r = 0; r < ringCount; r++) {
    const phase = ((t * 3 + r / ringCount) % 1);
    const radius = phase * Math.max(W, H) * 0.85;
    const alpha = (1 - phase) * 0.25 * overlayAlpha;
    ctx.strokeStyle = r % 2 === 0 ? warpColor1 : warpColor2;
    ctx.lineWidth = 2;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Warp streaks
  const spd = t < 0.5 ? t * 2 : 1; // ramp up speed
  warpStreaks.forEach(s => {
    s.curDist += s.speed * spd;
    const x1 = cx + Math.cos(s.ang) * s.curDist;
    const y1 = cy + Math.sin(s.ang) * s.curDist;
    const x2 = cx + Math.cos(s.ang) * (s.curDist + s.len * spd);
    const y2 = cy + Math.sin(s.ang) * (s.curDist + s.len * spd);

    // Only draw if within screen bounds
    if (s.curDist > Math.max(W, H)) s.curDist = s.startDist;

    const grd = ctx.createLinearGradient(x1, y1, x2, y2);
    grd.addColorStop(0, s.color + '00');
    grd.addColorStop(1, s.color + 'ff');
    ctx.globalAlpha = s.alpha * overlayAlpha;
    ctx.strokeStyle = grd;
    ctx.lineWidth = s.width;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // Center glow burst
  const burstAlpha = Math.sin(t * Math.PI) * 0.6;
  const grd2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, W * 0.4);
  grd2.addColorStop(0, warpColor1 + '66');
  grd2.addColorStop(0.4, warpColor2 + '22');
  grd2.addColorStop(1, '#00000000');
  ctx.globalAlpha = burstAlpha;
  ctx.fillStyle = grd2;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // WAVE text in center during warp peak
  if (t > 0.35 && t < 0.75) {
    const textAlpha = Math.min((t - 0.35) / 0.15, (0.75 - t) / 0.15);
    ctx.globalAlpha = textAlpha;
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = warpColor1;
    ctx.shadowBlur = 30;
    ctx.font = `900 ${Math.floor(W * 0.12)}px 'Orbitron', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`WAVE ${wave}`, cx, cy - H * 0.06);
    ctx.font = `400 ${Math.floor(W * 0.04)}px 'Share Tech Mono', monospace`;
    ctx.fillStyle = warpColor2;
    ctx.shadowColor = warpColor2;
    ctx.shadowBlur = 15;
    ctx.fillText(`LOOP ${chaosLoopCount + 1}  //  CHAOS ${Math.round(chaosLevel * 100)}%`, cx, cy + H * 0.06);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  warpTimer--;
  if (warpTimer <= 0) warpActive = false;
}
const shieldHudEl    = document.getElementById('shield-hud');

function drawShieldOrbs(now) {
  shieldOrbs.forEach(o => {
    o.angle += 0.04;
    o.pulse = Math.sin(now * 0.004) * 0.5 + 0.5;
    const age = (now - o.born) / o.life;
    const alpha = Math.max(0, 1 - age * 0.4);

    ctx.save();
    ctx.translate(o.x, o.y);

    // Glow via gradient — no shadowBlur
    const grd = ctx.createRadialGradient(0, 0, 0, 0, 0, o.r * 2.5);
    grd.addColorStop(0, hexToRgba('#ff00aa', 0.35 * alpha));
    grd.addColorStop(1, hexToRgba('#ff00aa', 0));
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(0, 0, o.r * 2.5, 0, Math.PI * 2); ctx.fill();

    // Outer spinning dashed ring
    ctx.save();
    ctx.rotate(o.angle);
    ctx.strokeStyle = hexToRgba('#ff00aa', alpha * (0.6 + o.pulse * 0.4));
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const a2 = ((i + 0.6) / 6) * Math.PI * 2;
      ctx.moveTo(Math.cos(a) * o.r * 1.8, Math.sin(a) * o.r * 1.8);
      ctx.arc(0, 0, o.r * 1.8, a, a2);
    }
    ctx.stroke();
    ctx.restore();

    // Counter-rotating inner ring
    ctx.save();
    ctx.rotate(-o.angle * 1.5);
    ctx.strokeStyle = hexToRgba('#bf00ff', alpha * 0.7);
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, o.r * 1.2, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();

    // Core
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff00aa';
    ctx.beginPath(); ctx.arc(0, 0, o.r * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(0, 0, o.r * 0.2, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function drawShieldRing(now) {
  if (!shieldActive) return;
  const p = player;
  const timeLeft = shieldTimer / SHIELD_DURATION;
  const pulse = Math.sin(now * 0.008) * 0.3 + 0.7;

  ctx.save();
  ctx.translate(p.x, p.y);

  // Glow aura — radial gradient, no shadowBlur
  const auraGrd = ctx.createRadialGradient(0, 0, p.r * 1.4, 0, 0, p.r * 2.8);
  auraGrd.addColorStop(0, hexToRgba('#ff00aa', 0.18 * pulse * timeLeft));
  auraGrd.addColorStop(1, hexToRgba('#ff00aa', 0));
  ctx.fillStyle = auraGrd;
  ctx.beginPath(); ctx.arc(0, 0, p.r * 2.8, 0, Math.PI * 2); ctx.fill();

  // Wide soft outer stroke (glow illusion via thick+thin double stroke)
  for (let i = 0; i < 3; i++) {
    const rotSpeed = [0.03, -0.02, 0.015][i];
    const ringR = p.r * (1.7 + i * 0.25);
    ctx.save();
    ctx.rotate(frame * rotSpeed);

    if (i === 0) {
      // Thick dim stroke underneath
      ctx.strokeStyle = hexToRgba('#ff00aa', timeLeft * pulse * 0.3);
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.arc(0, 0, ringR, -Math.PI/2, -Math.PI/2 + timeLeft * Math.PI * 2);
      ctx.stroke();
      // Crisp bright stroke on top
      ctx.strokeStyle = hexToRgba('#ff00aa', timeLeft * pulse * 0.9);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, ringR, -Math.PI/2, -Math.PI/2 + timeLeft * Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.strokeStyle = hexToRgba(i === 1 ? '#ff00aa' : '#bf00ff', 0.3 * timeLeft);
      ctx.lineWidth = 1.5;
      for (let s = 0; s < 8; s++) {
        const a = (s / 8) * Math.PI * 2, a2 = ((s + 0.5) / 8) * Math.PI * 2;
        ctx.beginPath(); ctx.arc(0, 0, ringR, a, a2); ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Hit pip diamonds
  for (let h = 0; h < SHIELD_MAX_HITS; h++) {
    const ang = (h / SHIELD_MAX_HITS) * Math.PI * 2 - Math.PI / 2;
    const pr = p.r * 2.1;
    const alive = h < (SHIELD_MAX_HITS - shieldHits);
    ctx.save();
    ctx.translate(Math.cos(ang) * pr, Math.sin(ang) * pr);
    ctx.rotate(ang + Math.PI / 4);
    ctx.fillStyle = alive ? '#ff00aa' : 'rgba(255,0,170,0.2)';
    ctx.globalAlpha = alive ? 1 : 0.3;
    const d = 5;
    ctx.beginPath();
    ctx.moveTo(0,-d); ctx.lineTo(d,0); ctx.lineTo(0,d); ctx.lineTo(-d,0);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function shieldAbsorbHit() {
  shieldHits++;
  spawnParticles(player.x, player.y, '#ff00aa', 18);
  spawnShockwave(player.x, player.y, '#ff00aa');

}

// --- UPDATE ---
function update(now, dt) {
  frame++;

  // Level up (still track for score milestones)
  const newLevel = Math.floor(score / 300) + 1;
  if (newLevel !== level) {
    level = newLevel;
    // Spawn interval tightens with both level AND chaos
    spawnInterval = Math.max(200, 900 - level * 30 - chaosLevel * 300);
    levelDisplay.textContent = 'LVL ' + String(level).padStart(2,'0');
    bgFlashColor = '#00ffff';
    bgFlash = 0.5;
    spawnParticles(W/2, H/2, '#00ffff', 20);
    spawnShockwave(W/2, H/2, '#00ffff');
  }

  // Also dynamically update spawnInterval with chaos each frame
  spawnInterval = Math.max(200, 900 - level * 30 - chaosLevel * 300);
  updateChaosHUD();

  // --- WAVE TIMER ---
  if (!waveClearing) {
    waveTimer += dt;
    if (waveTimer >= WAVE_DURATION) {
      // Wave complete — start clearing
      waveClearing = true;
      lastSpawn = now + 99999; // stop spawning
      orbs = []; // remove orbs
      chargeUps = []; // cancel pending charges
    }
  }

  // --- CLEARING PHASE: drain bullets off screen ---
  if (waveClearing) {
    // Speed up remaining bullets
    bullets.forEach(b => { b.vx *= 1.04; b.vy *= 1.04; b.vy += 0.15; });

    if (bullets.length === 0) {
      // All bullets gone — start warp then advance wave
      waveClearing = false;
      const completedWave = wave;
      wave++;
      waveTimer = 0;
      waveStartTime = now;
      lastOrbSpawn = now + 3500;

      growShip();
      addScore(100 * completedWave);
      waveDisplayEl.textContent = `WAVE ${wave}`;

      // Trigger warp scene
      startWarp(wave);

      // Hold spawning until warp + banner done
      lastSpawn = now + (WARP_DURATION / 60 * 1000) + 2200;
      setTimeout(() => {
        showWaveBanner(wave, () => { lastSpawn = performance.now() + 300; });
      }, (WARP_DURATION / 60 * 1000) + 100);
    }
  }

  // --- MOVEMENT — ship follows fingertip directly ---
  if (touch.active) {
    touch.vx = touch.vx !== undefined ? touch.vx * 0.5 + (touch.x - (touch.px || touch.x)) * 0.5 : 0;
    touch.vy = touch.vy !== undefined ? touch.vy * 0.5 + (touch.y - (touch.py || touch.y)) * 0.5 : 0;
    touch.px = touch.x;
    touch.py = touch.y;

    // Slight horizontal lead only — stays on fingertip vertically
    const hLead = Math.max(-25, Math.min(25, touch.vx * 2));

    player.x += (touch.x + hLead - player.x) * 0.22;
    player.y += (touch.y - 65 - player.y) * 0.22;
  } else {
    touch.vx = 0; touch.vy = 0;
  }
  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));

  // Spawn bullets (only when not clearing)
  if (!waveClearing && now - lastSpawn > spawnInterval) {
    spawnBullets(now);
    lastSpawn = now;
    addScore(1);
  }

  // Tick charge-up animations
  updateChargeUps();

  // Spawn orbs (only when not clearing)
  if (!waveClearing && now - lastOrbSpawn > orbSpawnInterval) {
    spawnOrb(now);
    lastOrbSpawn = now;
  }

  // Update bullets — shield absorbs hits
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x < -60 || b.x > W+60 || b.y < -60 || b.y > H+100) return false;

    // Hitbox is 55% of visual radius — forgiving for big fingers
    if (!waveClearing && dist(b, player) < b.r + player.r * 0.55) {
      if (shieldActive && shieldHits < SHIELD_MAX_HITS) {
        shieldAbsorbHit();
        return false; // bullet destroyed on shield
      } else if (!invincible) {
        triggerDeath();
        return false;
      }
    }
    return true;
  });

  // Update shield orbs
  const now2 = now;
  shieldOrbs = shieldOrbs.filter(o => {
    if (now2 - o.born > o.life) return false;
    if (dist(o, player) < o.r + player.r) {
      activateShield();
      return false;
    }
    return true;
  });

  // Tick shield timer
  if (shieldActive) {
    shieldTimer--;
    if (shieldTimer <= 0) {
      shieldActive = false;
      shieldTimer = 0;
    }
  }
  updateShieldHUD();

  // Update orbs
  orbs = orbs.filter(o => {
    if (now - o.born > o.life) return false;
    if (dist(o, player) < o.r + player.r) {
      combo++;
      comboTimer = 200;
      showCombo(combo, o.x, o.y);
      addScore(50 * Math.max(1, combo));
      bgFlashColor = getComboColors(combo)?.[0] || '#ffff00';
      bgFlash = 0.3 + Math.min(combo * 0.08, 0.5);
      invincible = true;
      invincibleTimer = 90;

      // Drop shield orb on x5 (and every 5 after) if not already active/pending
      if (combo >= 5 && combo % 5 === 0 && !shieldActive && !shieldOrbPending && shieldOrbs.length === 0) {
        shieldOrbPending = true;
        setTimeout(() => spawnShieldOrb(player.x, player.y - 80), 400);
      }
      return false;
    }
    return true;
  });

  // Combo timer
  if (comboTimer > 0) comboTimer--;
  else if (combo > 0) combo = 0;

  // Invincibility
  if (invincible) {
    invincibleTimer--;
    if (invincibleTimer <= 0) invincible = false;
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life -= p.decay;
    return p.life > 0;
  });

  // Shockwaves
  shockwaves = shockwaves.filter(s => {
    s.r += 4;
    s.life -= 0.06;
    return s.life > 0;
  });

  // Near miss check
  if (bullets.length > 0) checkNearMiss();
  else { dangerRingEl.style.opacity = '0'; }

  // Comet trails
  updateCometTrails();

  // Periodic lightning between nearby bullets for ambience
  if (frame % 40 === 0 && bullets.length >= 2) {
    const b1 = bullets[Math.floor(Math.random() * bullets.length)];
    const b2 = bullets[Math.floor(Math.random() * bullets.length)];
    if (b1 !== b2 && dist(b1, b2) < 120) {
      spawnLightning(b1.x, b1.y, b2.x, b2.y, b1.color);
    }
  }
}

function triggerDeath() {
  gameState = 'dead';
  spawnParticles(player.x, player.y, '#ff00aa', 30);
  spawnShockwave(player.x, player.y, '#ff00aa');
  bgFlash = 1;
  if (score > bestScore) bestScore = score;
  setTimeout(showGameOver, 800);
}

function showGameOver() {
  finalScoreEl.textContent = score;
  bestScoreEl.textContent = 'BEST: ' + bestScore;
  gameoverScreen.classList.remove('hidden');
  scoreDisplay.classList.remove('visible');
  levelDisplay.classList.remove('visible');
  waveDisplayEl.classList.remove('visible');
  document.getElementById('size-bar-wrap').classList.remove('visible');
  chaosWrapEl.classList.remove('visible');
  dangerRingEl.style.opacity = '0';
  nearMissEl.style.opacity = '0';
}

// --- RENDER ---
function render(now) {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  if (frame % 2 === 0) drawNebulas(now);
  drawGrid();
  if (frame % 2 === 0) drawGridSparks();
  drawStars();
  if (frame % 3 === 0) drawRunes(now);

  if (gameState === 'playing' || gameState === 'dead') {
    drawShockwaves();
    drawCometTrails();
    drawChargeUps(now);
    drawOrbs(now);
    drawShieldOrbs(now);
    drawBullets();
    drawLightning();
    drawParticles();
    if (gameState === 'playing') {
      drawShieldRing(now);
      drawPlayer();
    } else drawParticles();
  }

  drawChromaticOverlay();
  drawWarp(now); // always on top
}

// --- LOOP ---
function loop(ts) {
  const dt = ts - lastTime;
  lastTime = ts;

  if (gameState === 'playing') {
    update(ts, dt);
  }
  render(ts);

  if (gameState === 'dead' && particles.length === 0 && shockwaves.length === 0) {
    // keep looping for background
  }

  animId = requestAnimationFrame(loop);
}

// --- INPUT ---
function getTouchPos(e) {
  const t = e.touches ? e.touches[0] : e;
  const rect = canvas.getBoundingClientRect();
  return {
    x: (t.clientX - rect.left),
    y: (t.clientY - rect.top)
  };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const pos = getTouchPos(e);
  touch = { x: pos.x, y: pos.y, active: true };
  if (gameState !== 'playing') return;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch.active) return;
  const pos = getTouchPos(e);
  touch.x = pos.x;
  touch.y = pos.y;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touch.active = false;
}, { passive: false });

// Mouse fallback
canvas.addEventListener('mousedown', e => {
  touch = { x: e.clientX, y: e.clientY, active: true };
});
canvas.addEventListener('mousemove', e => {
  if (!touch.active) return;
  touch.x = e.clientX;
  touch.y = e.clientY;
});
canvas.addEventListener('mouseup', () => touch.active = false);

// Buttons
document.getElementById('start-btn').addEventListener('click', () => {
  startScreen.classList.add('hidden');
  initGame();
});

document.getElementById('retry-btn').addEventListener('click', () => {
  gameoverScreen.classList.add('hidden');
  initGame();
});

// Init
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(loop);
</script>
</body>
