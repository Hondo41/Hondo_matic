<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEON VOID</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --neon-cyan: #00ffff;
    --neon-pink: #ff00aa;
    --neon-yellow: #ffff00;
    --neon-purple: #bf00ff;
    --dark-bg: #030008;
    --grid-color: rgba(0,255,255,0.04);
  }

  body {
    background: var(--dark-bg);
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
  }

  canvas {
    display: block;
    touch-action: none;
  }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  #score-display {
    position: fixed;
    top: env(safe-area-inset-top, 16px);
    left: 50%;
    transform: translateX(-50%);
    margin-top: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(18px, 5vw, 28px);
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px var(--neon-cyan);
    letter-spacing: 4px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #score-display.visible { opacity: 1; }

  #level-display {
    position: fixed;
    top: env(safe-area-inset-top, 16px);
    right: 16px;
    margin-top: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 3vw, 14px);
    color: var(--neon-pink);
    text-shadow: 0 0 8px var(--neon-pink);
    letter-spacing: 2px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #level-display.visible { opacity: 1; }

  /* SCREENS */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    background: radial-gradient(ellipse at center, rgba(3,0,8,0.95) 0%, rgba(3,0,8,0.99) 100%);
    padding: 20px;
  }

  .screen.hidden { display: none; }

  .glitch-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(48px, 16vw, 88px);
    color: var(--neon-cyan);
    text-shadow:
      0 0 10px var(--neon-cyan),
      0 0 40px var(--neon-cyan),
      0 0 80px var(--neon-cyan);
    letter-spacing: 8px;
    position: relative;
    animation: glitch 3s infinite;
    line-height: 1;
    text-align: center;
  }

  @keyframes glitch {
    0%, 92%, 100% { transform: translate(0); filter: none; }
    93% { transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
    94% { transform: translate(3px, -1px); color: var(--neon-pink); }
    95% { transform: translate(0); filter: none; }
    97% { transform: translate(2px, 2px); filter: blur(1px); }
    98% { transform: translate(-2px, 0); color: var(--neon-yellow); }
    99% { transform: translate(0); filter: none; }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 3vw, 14px);
    color: var(--neon-pink);
    letter-spacing: 6px;
    text-shadow: 0 0 8px var(--neon-pink);
    margin-top: 12px;
    margin-bottom: 48px;
    text-align: center;
  }

  .neon-btn {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: clamp(14px, 4vw, 18px);
    letter-spacing: 4px;
    color: var(--dark-bg);
    background: var(--neon-cyan);
    border: none;
    padding: 18px 48px;
    cursor: pointer;
    pointer-events: all;
    box-shadow:
      0 0 20px var(--neon-cyan),
      0 0 60px rgba(0,255,255,0.4),
      inset 0 0 20px rgba(0,255,255,0.2);
    transition: all 0.15s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    -webkit-clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    text-transform: uppercase;
  }

  .neon-btn:active {
    transform: scale(0.96);
    box-shadow: 0 0 40px var(--neon-cyan), 0 0 100px rgba(0,255,255,0.6);
  }

  .neon-btn.pink {
    background: var(--neon-pink);
    color: white;
    box-shadow: 0 0 20px var(--neon-pink), 0 0 60px rgba(255,0,170,0.4);
  }

  .instructions {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(12px, 3.5vw, 15px);
    color: rgba(0,255,255,0.5);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 40px;
    line-height: 2;
  }

  #gameover-screen .big-score {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(64px, 20vw, 120px);
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow), 0 0 60px var(--neon-yellow);
    line-height: 1;
    margin: 8px 0;
  }

  #gameover-screen .score-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(11px, 3vw, 13px);
    color: rgba(255,255,0,0.5);
    letter-spacing: 6px;
    margin-bottom: 4px;
  }

  #gameover-screen .best-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(13px, 3.5vw, 16px);
    color: var(--neon-pink);
    letter-spacing: 4px;
    margin-bottom: 40px;
    text-shadow: 0 0 8px var(--neon-pink);
  }

  #gameover-screen .died-text {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: clamp(20px, 6vw, 30px);
    color: var(--neon-pink);
    text-shadow: 0 0 15px var(--neon-pink), 0 0 40px var(--neon-pink);
    letter-spacing: 6px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  #combo-display {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(32px, 10vw, 56px);
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow);
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: none;
    white-space: nowrap;
  }

  #combo-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 45;
    opacity: 0;
    mix-blend-mode: screen;
  }

  #flash-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 46;
    opacity: 0;
    background: white;
    transition: opacity 0.05s;
  }

  #streak-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 44;
    overflow: hidden;
  }

  .streak {
    position: absolute;
    height: 2px;
    border-radius: 2px;
    opacity: 0;
    animation: streakAnim 0.4s ease-out forwards;
  }

  @keyframes streakAnim {
    0%   { opacity: 1; transform: scaleX(0); transform-origin: left; }
    60%  { opacity: 1; transform: scaleX(1); }
    100% { opacity: 0; transform: scaleX(1); }
  }

  #combo-ring {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 0; height: 0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 43;
    transform: translate(-50%, -50%);
    border: 3px solid transparent;
    opacity: 0;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="scanlines"></div>
<div class="vignette"></div>

<div id="score-display">00000</div>
<div id="level-display">LVL 01</div>
<div id="combo-display"></div>
<canvas id="combo-overlay"></canvas>
<div id="flash-overlay"></div>
<div id="streak-container"></div>
<div id="combo-ring"></div>

<!-- START SCREEN -->
<div class="screen" id="start-screen">
  <div class="glitch-title">NEON<br>VOID</div>
  <div class="subtitle">// DODGE OR DIE //</div>
  <div class="instructions">
    DRAG TO MOVE YOUR SHIP<br>
    SURVIVE AS LONG AS YOU CAN
  </div>
  <button class="neon-btn" id="start-btn">JACK IN</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameover-screen">
  <div class="died-text">YOU FLATLINED</div>
  <div class="score-label">SCORE</div>
  <div class="big-score" id="final-score">0</div>
  <div class="best-score" id="best-score-display">BEST: 0</div>
  <button class="neon-btn pink" id="retry-btn">RETRY</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreDisplay = document.getElementById('score-display');
const levelDisplay = document.getElementById('level-display');
const comboDisplay = document.getElementById('combo-display');
const startScreen = document.getElementById('start-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const finalScoreEl = document.getElementById('final-score');
const bestScoreEl = document.getElementById('best-score-display');

let W, H, dpr;
let gameState = 'start'; // start, playing, dead
let score = 0, bestScore = 0, level = 1;
let frame = 0;
let animId;
let lastTime = 0;

// Player
let player = {};
let touch = { x: 0, y: 0, active: false };

// Game objects
let bullets = [], particles = [], stars = [], orbs = [];
let shockwaves = [];

// Timing
let spawnInterval = 900;
let lastSpawn = 0;
let orbSpawnInterval = 3000;
let lastOrbSpawn = 0;
let invincible = false;
let invincibleTimer = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  initStars();
  if (gameState !== 'playing') return;
  player.x = Math.min(Math.max(player.x, player.r), W - player.r);
  player.y = Math.min(Math.max(player.y, player.r), H - player.r);
}

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.2,
      speed: Math.random() * 0.4 + 0.05,
      alpha: Math.random() * 0.6 + 0.1
    });
  }
}

function initGame() {
  score = 0; level = 1; frame = 0;
  bullets = []; particles = []; orbs = []; shockwaves = [];
  spawnInterval = 900;
  lastSpawn = 0; lastOrbSpawn = 0;
  invincible = false; invincibleTimer = 0;

  player = {
    x: W / 2, y: H * 0.65,
    r: Math.min(W, H) * 0.028,
    targetX: W / 2, targetY: H * 0.65,
    trail: []
  };
  touch = { x: W / 2, y: H * 0.65, active: false };
  scoreDisplay.textContent = '00000';
  scoreDisplay.classList.add('visible');
  levelDisplay.classList.add('visible');
  levelDisplay.textContent = 'LVL 01';
  gameState = 'playing';
}

// --- BULLET PATTERNS ---
function spawnBullets(now) {
  const patterns = ['scatter', 'aimed', 'spiral', 'ring', 'cross'];
  const wt = [40, 30, 15, 10, 5];
  const total = wt.reduce((a,b)=>a+b,0);
  let r = Math.random() * total, pick = 0;
  for (let i = 0; i < wt.length; i++) { r -= wt[i]; if (r <= 0) { pick = i; break; } }
  const pattern = level >= 3 ? patterns[Math.min(pick, patterns.length-1)] : patterns[Math.min(pick,1)];

  const speed = 2.2 + level * 0.35;
  const cx = W / 2, cy = 0;

  if (pattern === 'scatter') {
    const count = 3 + Math.floor(level * 0.8);
    for (let i = 0; i < count; i++) {
      const x = Math.random() * W * 0.8 + W * 0.1;
      const ang = Math.PI / 2 + (Math.random() - 0.5) * 0.8;
      bullets.push({ x, y: -10, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed, r: 5, color: '#ff00aa', glow: '#ff00aa' });
    }
  } else if (pattern === 'aimed') {
    const count = 2 + Math.floor(level * 0.5);
    for (let i = 0; i < count; i++) {
      const sx = Math.random() * W;
      const sy = -10;
      const dx = player.x - sx + (Math.random()-0.5)*60;
      const dy = player.y - sy;
      const dist = Math.sqrt(dx*dx+dy*dy);
      bullets.push({ x: sx, y: sy, vx: dx/dist*speed, vy: dy/dist*speed, r: 6, color: '#bf00ff', glow: '#bf00ff' });
    }
  } else if (pattern === 'spiral') {
    const count = 8;
    const baseAng = (frame * 0.05);
    for (let i = 0; i < count; i++) {
      const ang = baseAng + (i / count) * Math.PI * 2;
      bullets.push({ x: W/2, y: H*0.15, vx: Math.cos(ang)*speed*1.1, vy: Math.sin(ang)*speed*1.1, r: 5, color: '#00ffff', glow: '#00ffff' });
    }
  } else if (pattern === 'ring') {
    const count = 12 + level;
    for (let i = 0; i < count; i++) {
      const ang = (i / count) * Math.PI * 2;
      bullets.push({ x: W/2, y: H*0.1, vx: Math.cos(ang)*speed, vy: Math.sin(ang)*speed, r: 5, color: '#ffff00', glow: '#ffff00' });
    }
  } else if (pattern === 'cross') {
    const dirs = [0, Math.PI/2, Math.PI, Math.PI*1.5, Math.PI/4, Math.PI*3/4, Math.PI*5/4, Math.PI*7/4];
    dirs.forEach(ang => {
      bullets.push({ x: W/2, y: H/2, vx: Math.cos(ang)*speed*1.3, vy: Math.sin(ang)*speed*1.3, r: 6, color: '#ff6600', glow: '#ff6600' });
    });
  }
}

function spawnOrb(now) {
  orbs.push({
    x: Math.random() * W * 0.7 + W * 0.15,
    y: Math.random() * H * 0.4 + H * 0.1,
    r: 10,
    life: 4000,
    born: now,
    pulse: Math.random() * Math.PI * 2
  });
}

function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      r: Math.random() * 3 + 1,
      life: 1,
      color,
      decay: Math.random() * 0.03 + 0.02
    });
  }
}

function spawnShockwave(x, y, color) {
  shockwaves.push({ x, y, r: 0, maxR: 60, color, life: 1 });
}

// --- DRAW ---
function drawGrid() {
  ctx.strokeStyle = 'rgba(0,255,255,0.035)';
  ctx.lineWidth = 0.5;
  const spacing = 40;
  const offset = (frame * 0.5) % spacing;
  for (let y = -spacing + offset; y < H + spacing; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let x = 0; x < W + spacing; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
}

function drawStars() {
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const p = player;

  // Trail
  p.trail.push({ x: p.x, y: p.y });
  if (p.trail.length > 18) p.trail.shift();
  p.trail.forEach((pt, i) => {
    const a = i / p.trail.length * 0.4;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#00ffff';
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, p.r * 0.35 * (i / p.trail.length), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Glow
  if (invincible && Math.floor(frame / 4) % 2 === 0) {
    ctx.globalAlpha = 0.3;
  }
  const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.5);
  grd.addColorStop(0, 'rgba(0,255,255,0.3)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2); ctx.fill();

  // Ship body (diamond/arrow shape)
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 20;
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 2;
  ctx.fillStyle = 'rgba(0,255,255,0.15)';
  ctx.beginPath();
  ctx.moveTo(0, -p.r * 1.3);
  ctx.lineTo(p.r * 0.8, p.r * 0.8);
  ctx.lineTo(0, p.r * 0.4);
  ctx.lineTo(-p.r * 0.8, p.r * 0.8);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Core
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(0, 0, p.r * 0.25, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawBullets() {
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.glow;
    ctx.shadowBlur = 15;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    // Inner bright core
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawOrbs(now) {
  orbs.forEach(o => {
    const age = (now - o.born) / o.life;
    const pulse = Math.sin(now * 0.005 + o.pulse) * 0.3 + 0.7;
    ctx.save();
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 25 * pulse;
    ctx.globalAlpha = (1 - age * 0.4) * pulse;
    // Outer ring
    ctx.strokeStyle = '#ffff00';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 1.5, 0, Math.PI * 2); ctx.stroke();
    // Inner
    ctx.fillStyle = '#ffff00';
    ctx.beginPath(); ctx.arc(o.x, o.y, o.r * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function drawShockwaves() {
  shockwaves.forEach(s => {
    ctx.save();
    ctx.globalAlpha = s.life * 0.6;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

// --- BACKGROUND FLICKER ---
let bgFlash = 0;
let bgFlashColor = '#ffffff';

function drawBackground() {
  const r = bgFlash > 0 ? 0.6 : 0.88;
  ctx.fillStyle = `rgba(3,0,8,${r})`;
  ctx.fillRect(0, 0, W, H);

  // Colored tint overlay on flash
  if (bgFlash > 0.1) {
    const hex = bgFlashColor;
    const pr = parseInt(hex.slice(1,3),16);
    const pg = parseInt(hex.slice(3,5),16);
    const pb = parseInt(hex.slice(5,7),16);
    ctx.fillStyle = `rgba(${pr},${pg},${pb},${bgFlash * 0.08})`;
    ctx.fillRect(0, 0, W, H);
    bgFlash -= 0.04;
  } else if (bgFlash > 0) {
    bgFlash -= 0.04;
  }
}

// --- COLLISION ---
function dist(a, b) {
  return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2);
}

// --- SCORE ---
let comboTimer = 0, combo = 0;

const flashOverlay = document.getElementById('flash-overlay');
const streakContainer = document.getElementById('streak-container');
const comboRing = document.getElementById('combo-ring');
const comboOverlayCanvas = document.getElementById('combo-overlay');
const coctx = comboOverlayCanvas.getContext('2d');

const COMBO_COLORS = [
  null,           // 0
  null,           // 1
  ['#ffff00','#ffe000'],   // 2
  ['#ff6600','#ff9900'],   // 3
  ['#ff00aa','#ff66cc'],   // 4
  ['#bf00ff','#e066ff'],   // 5
  ['#00ffff','#ff00ff'],   // 6
  ['#ffffff','#00ffff'],   // 7+
];

function getComboColors(n) {
  if (n <= 1) return null;
  return COMBO_COLORS[Math.min(n, COMBO_COLORS.length - 1)];
}

function resizeComboCanvas() {
  comboOverlayCanvas.width = window.innerWidth;
  comboOverlayCanvas.height = window.innerHeight;
}
resizeComboCanvas();
window.addEventListener('resize', resizeComboCanvas);

// Chromatic glitch lines across the screen
let chromaticLines = [];
let chromaticTimer = 0;

function triggerChromaticGlitch(colors, intensity) {
  chromaticLines = [];
  const count = Math.floor(intensity * 12) + 3;
  for (let i = 0; i < count; i++) {
    chromaticLines.push({
      y: Math.random() * window.innerHeight,
      h: Math.random() * 8 + 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: Math.random() * 0.7 + 0.3,
      life: 1,
      decay: Math.random() * 0.08 + 0.04,
      offsetX: (Math.random() - 0.5) * 40 * intensity
    });
  }
  chromaticTimer = Math.floor(intensity * 10) + 4;
}

function drawChromaticOverlay() {
  coctx.clearRect(0, 0, comboOverlayCanvas.width, comboOverlayCanvas.height);
  if (chromaticLines.length === 0) {
    comboOverlayCanvas.style.opacity = '0';
    return;
  }
  comboOverlayCanvas.style.opacity = '1';
  chromaticLines.forEach(l => {
    coctx.globalAlpha = l.alpha * l.life;
    coctx.fillStyle = l.color;
    coctx.fillRect(l.offsetX, l.y, comboOverlayCanvas.width, l.h);
    l.life -= l.decay;
  });
  chromaticLines = chromaticLines.filter(l => l.life > 0);
  coctx.globalAlpha = 1;
}

// Screen edge burst
function triggerEdgeBurst(colors, intensity) {
  const streaks = Math.floor(intensity * 20) + 8;
  for (let i = 0; i < streaks; i++) {
    const el = document.createElement('div');
    el.className = 'streak';
    const fromEdge = Math.random() < 0.5;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const w = Math.random() * 40 * intensity + 20;
    const y = Math.random() * 100;
    el.style.cssText = `
      width: ${w}vw;
      top: ${y}%;
      left: ${fromEdge ? '0' : 'auto'};
      right: ${fromEdge ? 'auto' : '0'};
      background: linear-gradient(${fromEdge ? '90deg' : '270deg'}, ${color}, transparent);
      box-shadow: 0 0 8px ${color};
      animation-delay: ${Math.random() * 0.1}s;
    `;
    streakContainer.appendChild(el);
    setTimeout(() => el.remove(), 500);
  }
}

// Ring pulse
function triggerRingPulse(x, y, colors, intensity) {
  const rings = Math.floor(intensity * 3) + 1;
  for (let r = 0; r < rings; r++) {
    const el = document.createElement('div');
    const size = (r + 1) * 60 * intensity;
    const color = colors[r % colors.length];
    el.style.cssText = `
      position: fixed;
      left: ${x}px; top: ${y}px;
      width: ${size}px; height: ${size}px;
      border-radius: 50%;
      border: 3px solid ${color};
      box-shadow: 0 0 20px ${color}, inset 0 0 20px ${color}40;
      transform: translate(-50%, -50%) scale(0);
      opacity: 1;
      pointer-events: none;
      z-index: 43;
      transition: transform ${0.4 + r * 0.1}s ease-out, opacity ${0.4 + r * 0.1}s ease-out;
      transition-delay: ${r * 0.07}s;
    `;
    document.body.appendChild(el);
    requestAnimationFrame(() => {
      el.style.transform = 'translate(-50%, -50%) scale(1)';
      el.style.opacity = '0';
    });
    setTimeout(() => el.remove(), 700 + r * 100);
  }
}

// Flash overlay
function triggerFlash(colors, intensity) {
  const color = colors[0];
  flashOverlay.style.background = color;
  flashOverlay.style.opacity = String(Math.min(0.35, intensity * 0.12));
  setTimeout(() => flashOverlay.style.opacity = '0', 80);
}

// Floating score popup
function spawnScorePopup(x, y, pts, color) {
  const el = document.createElement('div');
  el.textContent = '+' + pts;
  el.style.cssText = `
    position: fixed;
    left: ${x}px; top: ${y}px;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(18px, 5vw, 28px);
    color: ${color};
    text-shadow: 0 0 10px ${color}, 0 0 30px ${color};
    pointer-events: none;
    z-index: 55;
    transform: translate(-50%, -50%);
    animation: floatUp 0.9s ease-out forwards;
    letter-spacing: 2px;
  `;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// Inject float-up keyframe once
const kfStyle = document.createElement('style');
kfStyle.textContent = `
  @keyframes floatUp {
    0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    20%  { opacity: 1; transform: translate(-50%, -80%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -160%) scale(0.9); }
  }
`;
document.head.appendChild(kfStyle);

function addScore(pts) {
  score += pts;
  scoreDisplay.textContent = String(score).padStart(5, '0');
}

function showCombo(n, ox, oy) {
  if (n < 2) return;
  const colors = getComboColors(n);
  if (!colors) return;
  const intensity = Math.min(n / 7, 1);
  const mainColor = colors[0];
  const label = n >= 7 ? `x${n} GODLIKE!!` : n >= 5 ? `x${n} INSANE!` : n >= 3 ? `x${n} COMBO!` : `x${n} COMBO`;

  // Combo text
  comboDisplay.textContent = label;
  comboDisplay.style.color = mainColor;
  comboDisplay.style.fontSize = `clamp(${28 + n*4}px, ${8 + n}vw, ${50 + n*6}px)`;
  comboDisplay.style.textShadow = `0 0 10px ${mainColor}, 0 0 40px ${mainColor}, 0 0 80px ${colors[1]}`;
  comboDisplay.style.opacity = '1';
  comboDisplay.style.animation = 'none';
  void comboDisplay.offsetWidth;
  comboDisplay.style.animation = `comboPop 0.2s ease-out`;
  clearTimeout(comboDisplay._t);
  comboDisplay._t = setTimeout(() => comboDisplay.style.opacity = '0', 1000 + n * 80);

  // All the effects scale with combo level
  triggerChromaticGlitch(colors, intensity);
  triggerEdgeBurst(colors, intensity);
  triggerRingPulse(ox, oy, colors, intensity);
  if (n >= 3) triggerFlash(colors, intensity);

  // Extra particles on canvas
  const pCount = 10 + n * 5;
  spawnParticles(ox, oy, mainColor, pCount);
  if (n >= 4) spawnParticles(ox, oy, colors[1], Math.floor(pCount / 2));

  // Multiple shockwaves for high combos
  const swCount = Math.min(n - 1, 4);
  for (let i = 0; i < swCount; i++) {
    setTimeout(() => spawnShockwave(ox, oy, colors[i % colors.length]), i * 80);
  }

  // Score popup
  const pts = 50 * Math.max(1, n);
  spawnScorePopup(ox, oy - 40, pts, mainColor);

  // Shake the score display
  scoreDisplay.style.transform = `translateX(-50%) scale(${1 + intensity * 0.3})`;
  scoreDisplay.style.color = mainColor;
  scoreDisplay.style.textShadow = `0 0 10px ${mainColor}, 0 0 30px ${mainColor}`;
  setTimeout(() => {
    scoreDisplay.style.transform = 'translateX(-50%) scale(1)';
    scoreDisplay.style.color = 'var(--neon-cyan)';
    scoreDisplay.style.textShadow = '0 0 10px var(--neon-cyan), 0 0 30px var(--neon-cyan)';
  }, 300);

  // bg flash color
  bgFlashColor = mainColor;
  bgFlash = 0.2 + intensity * 0.4;
}

// Inject comboPop keyframe
const kfStyle2 = document.createElement('style');
kfStyle2.textContent = `
  @keyframes comboPop {
    0%   { transform: translate(-50%, -50%) scale(0.3); }
    60%  { transform: translate(-50%, -50%) scale(1.15); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }
`;
document.head.appendChild(kfStyle2);

// --- UPDATE ---
function update(now, dt) {
  frame++;

  // Level up
  const newLevel = Math.floor(score / 300) + 1;
  if (newLevel !== level) {
    level = newLevel;
    spawnInterval = Math.max(280, 900 - level * 55);
    levelDisplay.textContent = 'LVL ' + String(level).padStart(2,'0');
    bgFlashColor = '#00ffff';
    bgFlash = 0.5;
    spawnParticles(W/2, H/2, '#00ffff', 20);
    spawnShockwave(W/2, H/2, '#00ffff');
  }

  // Move player toward touch
  if (touch.active) {
    const dx = touch.x - player.x;
    const dy = touch.y - player.y;
    const spd = 0.18;
    player.x += dx * spd;
    player.y += dy * spd;
  }
  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));

  // Spawn bullets
  if (now - lastSpawn > spawnInterval) {
    spawnBullets(now);
    lastSpawn = now;
    addScore(1);
  }

  // Spawn orbs
  if (now - lastOrbSpawn > orbSpawnInterval) {
    spawnOrb(now);
    lastOrbSpawn = now;
  }

  // Update bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) return false;

    // Collision
    if (!invincible && dist(b, player) < b.r + player.r * 0.85) {
      triggerDeath();
      return false;
    }
    return true;
  });

  // Update orbs
  orbs = orbs.filter(o => {
    if (now - o.born > o.life) return false;
    if (dist(o, player) < o.r + player.r) {
      // Collect!
      combo++;
      comboTimer = 200;
      showCombo(combo, o.x, o.y);
      addScore(50 * Math.max(1, combo));
      bgFlashColor = getComboColors(combo)?.[0] || '#ffff00';
      bgFlash = 0.3 + Math.min(combo * 0.08, 0.5);
      invincible = true;
      invincibleTimer = 90;
      return false;
    }
    return true;
  });

  // Combo timer
  if (comboTimer > 0) comboTimer--;
  else if (combo > 0) combo = 0;

  // Invincibility
  if (invincible) {
    invincibleTimer--;
    if (invincibleTimer <= 0) invincible = false;
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life -= p.decay;
    return p.life > 0;
  });

  // Shockwaves
  shockwaves = shockwaves.filter(s => {
    s.r += 4;
    s.life -= 0.06;
    return s.life > 0;
  });
}

function triggerDeath() {
  gameState = 'dead';
  spawnParticles(player.x, player.y, '#ff00aa', 30);
  spawnShockwave(player.x, player.y, '#ff00aa');
  bgFlash = 1;
  if (score > bestScore) bestScore = score;
  setTimeout(showGameOver, 800);
}

function showGameOver() {
  finalScoreEl.textContent = score;
  bestScoreEl.textContent = 'BEST: ' + bestScore;
  gameoverScreen.classList.remove('hidden');
  scoreDisplay.classList.remove('visible');
  levelDisplay.classList.remove('visible');
}

// --- RENDER ---
function render(now) {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawGrid();
  drawStars();

  if (gameState === 'playing' || gameState === 'dead') {
    drawShockwaves();
    drawOrbs(now);
    drawBullets();
    drawParticles();
    if (gameState === 'playing') drawPlayer();
    else drawParticles(); // extra pass after death
  }

  drawChromaticOverlay();
}

// --- LOOP ---
function loop(ts) {
  const dt = ts - lastTime;
  lastTime = ts;

  if (gameState === 'playing') {
    update(ts, dt);
  }
  render(ts);

  if (gameState === 'dead' && particles.length === 0 && shockwaves.length === 0) {
    // keep looping for background
  }

  animId = requestAnimationFrame(loop);
}

// --- INPUT ---
function getTouchPos(e) {
  const t = e.touches ? e.touches[0] : e;
  const rect = canvas.getBoundingClientRect();
  return {
    x: (t.clientX - rect.left),
    y: (t.clientY - rect.top)
  };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const pos = getTouchPos(e);
  touch = { x: pos.x, y: pos.y, active: true };
  if (gameState !== 'playing') return;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch.active) return;
  const pos = getTouchPos(e);
  touch.x = pos.x;
  touch.y = pos.y;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touch.active = false;
}, { passive: false });

// Mouse fallback
canvas.addEventListener('mousedown', e => {
  touch = { x: e.clientX, y: e.clientY, active: true };
});
canvas.addEventListener('mousemove', e => {
  if (!touch.active) return;
  touch.x = e.clientX;
  touch.y = e.clientY;
});
canvas.addEventListener('mouseup', () => touch.active = false);

// Buttons
document.getElementById('start-btn').addEventListener('click', () => {
  startScreen.classList.add('hidden');
  initGame();
});

document.getElementById('retry-btn').addEventListener('click', () => {
  gameoverScreen.classList.add('hidden');
  initGame();
});

// Init
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(loop);
</script>
</body>
